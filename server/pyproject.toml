[tool.pyright]
include = ["app", "tests"]
exclude = ["**/node_modules", "**/__pycache__"]
venv = "venv"
reportMissingImports = true
reportMissingTypeStubs = false
pythonVersion = "3.14"
executionEnvironments = [
  { root = "." }
]

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q"
testpaths = [
    "tests",
]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
